<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Background Putih Susu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #FEF9F0; /* putih susu */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 420px; /* lebar HP */
      min-height: 100vh;
      background-color: #FEF9F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.04);
    }

    /* info card opsional */
    .info {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 20px 28px;
      text-align: center;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .info h1 {
      font-size: 18px;
      font-weight: 600;
      color: #5C4033;
      margin-bottom: 6px;
    }

    .info p {
      font-size: 14px;
      color: #8B7355;
    }

    .color-code {
      margin-top: 12px;
      font-size: 12px;
      color: #A09080;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }

    /* swatch warna */
    .swatch {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: #FEF9F0;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.06);
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="info">
      <h1>☁️ Putih Susu</h1>
      <p>Background untuk layar HP</p>
      <div class="color-code">
        <span class="swatch"></span> #FEF9F0
      </div>
    </div>
  </div>
</body>
</html>
